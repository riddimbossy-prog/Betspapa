    <nav class="portal-nav" id="portalNav"><a class="" href="index.html">Home</a><a class="" href="papas-pick.html">Papa's Pick</a><a class="active" href="aggressive.html">Aggressive</a><a class="" href="safer.html">Safer</a><a class="" href="venue-pattern.html">Venue Pattern</a><a class="" href="bankers.html">Bankers</a><a class="" href="results-intelligence.html">Results</a><a class="" href="diagnostics.html">Diagnostics</a></nav>

</div>
