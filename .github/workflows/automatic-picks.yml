name: BetsPapa Automatic Picks

on:
  schedule:
    - cron: "17 */4 * * *"

  workflow_dispatch:
    inputs:
      date:
        description: "Optional base date in YYYY-MM-DD. Blank uses today in UTC."
        required: false
        type: string
      force_hydration:
        description: "Re-download history for teams already ready"
        required: false
        default: false
        type: boolean
      max_hydration_teams:
        description: "Maximum thin-data teams per job"
        required: false
        default: "40"
        type: string

  workflow_run:
    workflows: ["Deploy BetsPapa to GitHub Pages"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: betspapa-automatic-picks
  cancel-in-progress: false

env:
  ADMIN_SYNC_SECRET: ${{ secrets.ADMIN_SYNC_SECRET }}
  BETSPAPA_API_BASE: ${{ vars.BETSPAPA_API_BASE }}
  PIPELINE_DATE: ${{ inputs.date }}
  FORCE_HYDRATION: ${{ inputs.force_hydration }}
  MAX_HYDRATION_TEAMS: ${{ inputs.max_hydration_teams }}
  HYDRATION_WORKERS: ${{ vars.HYDRATION_WORKERS }}
  PIPELINE_RUN_ID: ${{ github.run_id }}

jobs:
  results:
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Validate admin secret
        run: test -n "$ADMIN_SYNC_SECRET"
      - name: Refresh and grade previous results
        env:
          PIPELINE_MODE: results
        run: node scripts/automatic-pipeline.mjs

  today:
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Validate admin secret
        run: test -n "$ADMIN_SYNC_SECRET"
      - name: Prepare today's fixtures and picks
        env:
          PIPELINE_MODE: today
        run: node scripts/automatic-pipeline.mjs

  tomorrow:
    needs: today
    if: success()
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Validate admin secret
        run: test -n "$ADMIN_SYNC_SECRET"
      - name: Prepare tomorrow's fixtures and early picks
        env:
          PIPELINE_MODE: tomorrow
        run: node scripts/automatic-pipeline.mjs
