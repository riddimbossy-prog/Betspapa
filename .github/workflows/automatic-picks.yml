name: BetsPapa Automatic Picks

on:
  schedule:
    # GitHub schedules use UTC. Refresh full fixture histories and picks every four hours.
    - cron: "17 */4 * * *"

  workflow_dispatch:
    inputs:
      date:
        description: "Optional target date in YYYY-MM-DD. Blank uses today in UTC."
        required: false
        type: string
      force_hydration:
        description: "Re-download history even for teams already ready"
        required: false
        default: false
        type: boolean
      max_hydration_teams:
        description: "Maximum thin-data teams to hydrate in this run"
        required: false
        default: "40"
        type: string

  workflow_run:
    workflows: ["Deploy BetsPapa to GitHub Pages"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: betspapa-automatic-picks
  cancel-in-progress: false

jobs:
  update-picks:
    # Run after a successful Pages deployment, on schedule, or manually.
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest
    timeout-minutes: 55

    env:
      ADMIN_SYNC_SECRET: ${{ secrets.ADMIN_SYNC_SECRET }}
      BETSPAPA_API_BASE: ${{ vars.BETSPAPA_API_BASE }}
      PIPELINE_DATE: ${{ inputs.date }}
      FORCE_HYDRATION: ${{ inputs.force_hydration }}
      MAX_HYDRATION_TEAMS: ${{ inputs.max_hydration_teams }}
      HYDRATION_WORKERS: ${{ vars.HYDRATION_WORKERS }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate automation secret
        shell: bash
        run: |
          if [ -z "$ADMIN_SYNC_SECRET" ]; then
            echo "::error::ADMIN_SYNC_SECRET is missing."
            echo "Add the same value used on Render under:"
            echo "GitHub repository → Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

      - name: Run automatic fixture and prediction pipeline
        shell: bash
        run: |
          node scripts/automatic-pipeline.mjs
