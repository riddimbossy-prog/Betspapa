name: BetsPapa Prepare Tomorrow Board

on:
  schedule:
    # Ghana uses UTC. First pass prepares tomorrow in the early evening.
    - cron: "25 17 * * *"
    # Second pass catches late fixture additions and team-history gaps.
    - cron: "25 22 * * *"

  workflow_dispatch:
    inputs:
      date:
        description: "Optional board date in YYYY-MM-DD. Blank uses tomorrow in UTC."
        required: false
        type: string
      force_hydration:
        description: "Re-download history even when a team already looks ready"
        required: false
        default: false
        type: boolean
      max_hydration_teams:
        description: "Maximum teams to hydrate in each preparation round"
        required: false
        default: "100"
        type: string
      preparation_rounds:
        description: "History and prediction rounds"
        required: false
        default: "2"
        type: string

permissions:
  contents: read

concurrency:
  group: betspapa-data-pipeline
  cancel-in-progress: false

jobs:
  prepare-tomorrow:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    env:
      ADMIN_SYNC_SECRET: ${{ secrets.ADMIN_SYNC_SECRET }}
      BETSPAPA_API_BASE: ${{ vars.BETSPAPA_API_BASE }}
      BOARD_DATE: ${{ inputs.date }}
      FORCE_HYDRATION: ${{ inputs.force_hydration }}
      MAX_HYDRATION_TEAMS: ${{ inputs.max_hydration_teams }}
      PREPARATION_ROUNDS: ${{ inputs.preparation_rounds }}
      HYDRATION_WORKERS: ${{ vars.HYDRATION_WORKERS }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate automation secret
        shell: bash
        run: |
          if [ -z "$ADMIN_SYNC_SECRET" ]; then
            echo "::error::ADMIN_SYNC_SECRET is missing."
            exit 1
          fi

      - name: Prepare tomorrow's complete board
        shell: bash
        run: node scripts/prepare-next-board.mjs
